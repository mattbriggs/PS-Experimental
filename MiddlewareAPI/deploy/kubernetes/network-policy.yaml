apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: content-resource-api
  namespace: content-resources
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: content-resource-api
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
      ports:
        - protocol: TCP
          port: 8080
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: webdav
      ports:
        - protocol: TCP
          port: 80
        - protocol: TCP
          port: 443
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: UDP
          port: 53
