# ExternalSecret (External Secrets Operator) — adapt to your secret provider.
# For initial deployments without ESO, replace with a plain Kubernetes Secret.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: content-resource-api-secrets
  namespace: content-resources
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: SecretStore
  target:
    name: content-resource-api-secrets
    creationPolicy: Owner
  data:
    - secretKey: APP_WEBDAV_BASE_URL
      remoteRef:
        key: content-resource-api/webdav
        property: base_url
    - secretKey: APP_WEBDAV_USERNAME
      remoteRef:
        key: content-resource-api/webdav
        property: username
    - secretKey: APP_WEBDAV_PASSWORD
      remoteRef:
        key: content-resource-api/webdav
        property: password
    # Add one entry per active API client:
    # - secretKey: API_KEY_client-001
    #   remoteRef:
    #     key: content-resource-api/api-keys
    #     property: client_001
